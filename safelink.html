<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TinyRedirect – Fast Minimal Shortener</title>
<style>
:root {
  --bg: #f9fafb;
  --surface: #ffffff;
  --accent: #0ea5e9;
  --accent-hover: #0284c7;
  --text: #111827;
  --muted: #6b7280;
  --border: #e5e7eb;
  --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Inter", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

/* CARD LAYOUT */
.container {
  width: 100%;
  max-width: 500px;
  background: var(--surface);
  border-radius: 20px;
  box-shadow: var(--shadow);
  padding: 36px 28px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  border: 1px solid var(--border);
  animation: fadeIn 0.5s ease;
}
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* HEADER */
h1 {
  font-size: 28px;
  text-align: center;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: 0.3px;
}
h1::after {
  content: "";
  display: block;
  width: 40px;
  height: 3px;
  background: var(--accent);
  margin: 10px auto 0;
  border-radius: 3px;
}

/* INPUT + BUTTON */
input[type="url"] {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 15px;
  background: #f9fafb;
  color: var(--text);
  transition: border 0.25s, box-shadow 0.25s;
}
input[type="url"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(14,165,233,0.2);
  outline: none;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: var(--accent);
  color: #fff;
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.25s, transform 0.15s;
}
button:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
}

/* RESULT */
#result {
  display: none;
  background: #f0f9ff;
  border: 1px solid #bae6fd;
  border-radius: 12px;
  padding: 14px 18px;
  text-align: center;
}
#result p:first-child {
  color: var(--muted);
  font-size: 14px;
}
.short-link-box {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 6px;
}
#shortLink {
  color: var(--accent);
  font-weight: 600;
  text-decoration: none;
  word-break: break-all;
}
.copy-btn {
  background: rgba(14,165,233,0.1);
  border: 1px solid rgba(14,165,233,0.2);
  color: var(--accent);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.25s;
}
.copy-btn:hover {
  background: rgba(14,165,233,0.2);
}

/* ADS GRID */
.ad-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
}
.ad {
  border-radius: 12px;
  height: 90px;
  background: linear-gradient(135deg, #e2e8f0, #f8fafc);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  overflow: hidden;
  transition: transform 0.3s, box-shadow 0.3s;
}
.ad:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(14,165,233,0.1);
}

/* REDIRECT OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(8px);
}
.redirect-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: var(--shadow);
  padding: 32px 26px;
  max-width: 480px;
  width: 90%;
  text-align: center;
}
.redirect-box h2 {
  color: var(--accent);
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 12px;
}
.percent {
  font-size: 52px;
  font-weight: 800;
  color: var(--accent);
  margin: 10px 0;
}
.progress {
  width: 100%;
  height: 8px;
  background: #e5e7eb;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 18px;
}
.progress > div {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: width 0.1s linear;
  border-radius: 10px;
}
.large-ad {
  height: 160px;
  border-radius: 12px;
  background: #f1f5f9;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 13px;
}

/* FOOTER */
footer {
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  margin-top: 10px;
}

/* RESPONSIVENESS */
@media (max-width: 500px) {
  h1 {
    font-size: 22px;
  }
  .container {
    padding: 28px 22px;
  }
  .large-ad {
    height: 120px;
  }
}

</style>
</head>
<body>

<div class="container">
  <h1>TinyRedirect</h1>
  <input id="urlInput" type="url" placeholder="Enter long URL (e.g. https://example.com)">
  <button id="shortenBtn">Shorten</button>

  <div id="result">
    <p>Your short link:</p>
    <div class="short-link-box">
      <a id="shortLink" href="#"></a>
      <button id="copyBtn" class="copy-btn">Copy</button>
    </div>
    <p id="copyMsg" style="font-size:12px;color:var(--muted);margin-top:4px;display:none;">Copied!</p>
  </div>

  <div class="ad-grid">
    <!--ADS 1-->
    <div class="ad skeleton">Ad Slot 1</div>
    <div class="ad skeleton">Ad Slot 2</div>
    <div class="ad skeleton">Ad Slot 3</div>
    <div class="ad skeleton">Ad Slot 4</div>
  </div>
</div>

<!-- Redirect Overlay -->
<div class="overlay" id="overlay">
  <div class="redirect-box">
    <h2>Reaching to target URL</h2>
    <div class="percent" id="percent">0%</div>
    <div class="progress"><div id="bar"></div></div>
    <div class="large-ad skeleton">Responsive Ad Slot</div>
    <footer>Redirecting after ad finishes...</footer>
  </div>
</div>

<script>
(function(){
"use strict";
const btn = document.getElementById('shortenBtn');
const input = document.getElementById('urlInput');
const result = document.getElementById('result');
const shortLink = document.getElementById('shortLink');
const overlay = document.getElementById('overlay');
const percentEl = document.getElementById('percent');
const bar = document.getElementById('bar');
const copyBtn = document.getElementById('copyBtn');
const copyMsg = document.getElementById('copyMsg');
const origin = location.origin + location.pathname;

/* Base64 safe encode/decode */
function encodeURL(url){
  return btoa(unescape(encodeURIComponent(url)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function decodeURL(str){
  try{
    str = str.replace(/-/g,'+').replace(/_/g,'/');
    return decodeURIComponent(escape(atob(str)));
  }catch(e){
    return null;
  }
}

/* Shorten button */
btn.addEventListener('click', () => {
  let longURL = input.value.trim();
  if (!longURL) return alert("Please enter a URL!");
  if (!/^https?:\/\//i.test(longURL)) longURL = "https://" + longURL;

  const encoded = encodeURL(longURL);
  const short = `${origin}#r=${encoded}`;

  shortLink.href = short;
  shortLink.textContent = short;
  result.style.display = 'block';
});

/* Copy button */
copyBtn.addEventListener('click', () => {
  const text = shortLink.textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    copyMsg.style.display = 'block';
    setTimeout(()=>copyMsg.style.display='none',1500);
  });
});

/* Redirect animation */
function startRedirect(target){
  overlay.style.display = "flex";
  let progress = 0;
  const tick = setInterval(()=>{
    progress++;
    percentEl.textContent = progress + "%";
    bar.style.width = progress + "%";
    if(progress >= 100){
      clearInterval(tick);
      window.location.href = target;
    }
  },100); // 100% in 10s
}

/* If #r= exists, redirect */
const match = location.hash.match(/#r=([^&]+)/);
if(match){
  const target = decodeURL(match[1]);
  if(target) setTimeout(()=>startRedirect(target),500);
}

/* Skeleton fade out */
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.querySelectorAll('.skeleton').forEach(el=>el.classList.remove('skeleton'));
  },600);
});
})();
</script>
</body>
</html>
