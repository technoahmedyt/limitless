<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Market Dip Alert Tool</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#111827;
  --accent:#3b82f6;
  --danger:#ef4444;
  --warning:#f59e0b;
  --info:#3b82f6;
  --muted:#6b7280;
  --bg:#f8fafc;
  --card:#ffffff;
  --border:#e5e7eb;
  --radius:10px;
  --shadow:0 4px 12px rgba(0,0,0,0.06);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--primary);
  padding:20px;
}

/* HEADER AD */
.header-ad{
  max-width:1000px;
  margin:0 auto 20px;
  height:90px;
  border:1px dashed #d1d5db;
  background:linear-gradient(135deg,#f3f4f6,#e5e7eb);
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  color:#6b7280;
}

/* LAYOUT */
.layout{
  display:flex;
  justify-content:center;
  gap:16px;
}

/* SIDEBARS */
.sidebar{
  width:160px;
  min-height:300px;
  border:1px dashed #d1d5db;
  background:linear-gradient(135deg,#f3f4f6,#e5e7eb);
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  color:#6b7280;
  position:sticky;
  top:20px;
}

/* MAIN */
.main-content{
  max-width:620px;
  width:100%;
}

.container{
  margin:0 auto;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  padding:24px;
  margin-bottom:24px;
}

h2{
  font-size:1.5rem;
  font-weight:700;
  margin-bottom:1.25rem;
}

.form-group{margin-bottom:1.25rem;}

label{
  font-size:0.875rem;
  font-weight:500;
  color:#4b5563;
  display:block;
  margin-bottom:6px;
}

input{
  width:100%;
  padding:10px;
  border:1px solid var(--border);
  border-radius:6px;
}

.presets{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.preset-btn{
  padding:6px 12px;
  border:1px solid #d1d5db;
  background:#f3f4f6;
  border-radius:6px;
  cursor:pointer;
}

.result-container{
  margin-top:16px;
  padding:16px;
  border:1px solid var(--border);
  border-radius:8px;
}

.dip-percentage{
  font-size:2rem;
  font-weight:700;
}

.strength-bar{
  height:8px;
  background:#e5e7eb;
  margin-top:10px;
  border-radius:4px;
}

.strength-fill{
  height:100%;
}

.strength-strong{background:#ef4444;}
.strength-moderate{background:#f59e0b;}
.strength-minor{background:#3b82f6;}

.ad-slot{
  border:1px dashed #d1d5db;
  padding:20px;
  text-align:center;
  border-radius:10px;
  margin:20px 0;
}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{display:none;}
  .layout{flex-direction:column;align-items:center;}
}
</style>
</head>

<body>

<!-- HEADER AD -->
<div class="header-ad">
  Header Ad 728×90
</div>

<div class="layout">

<!-- LEFT SIDEBAR -->
<aside class="sidebar">
  Left Ad 160×300
</aside>

<!-- MAIN -->
<main class="main-content">
<div class="container">

<div class="card">
<h2>Live Market Dip Alert</h2>

<div class="form-group">
<label>Previous Market High</label>
<input type="number" id="high" value="20000">
</div>

<div class="form-group">
<label>Current Index Value</label>
<input type="number" id="current" value="19000">
</div>

<div class="form-group">
<label>Dip Presets</label>
<div class="presets">
<button class="preset-btn" onclick="applyDip(5)">5%</button>
<button class="preset-btn" onclick="applyDip(10)">10%</button>
<button class="preset-btn" onclick="applyDip(15)">15%</button>
<button class="preset-btn" onclick="applyDip(20)">20%</button>
</div>
</div>

<div class="result-container">
<div class="dip-percentage" id="dipPercent">—</div>
<div id="statusText"></div>
<div class="strength-bar">
<div id="strengthBar" class="strength-fill"></div>
</div>
</div>
</div>

<div class="ad-slot">Middle Ad</div>

<div class="card">
<p style="font-size:13px;color:#6b7280;text-align:center;">
Disclaimer: Educational purposes only.
</p>
</div>

</div>
</main>

<!-- RIGHT SIDEBAR -->
<aside class="sidebar">
  Right Ad 160×300
</aside>

</div>

<script>
function applyDip(p){
  let h=+high.value;
  current.value=(h*(1-p/100)).toFixed(0);
  calc();
}

function calc(){
  let h=+high.value;
  let c=+current.value;

  if(h<=0||c<=0){return;}

  let d=((h-c)/h)*100;

  dipPercent.textContent=d.toFixed(2)+"%";

  let txt="",cls="";

  if(d>=15){txt="Strong Dip";cls="strength-strong";}
  else if(d>=10){txt="Moderate Dip";cls="strength-moderate";}
  else if(d>=5){txt="Minor Dip";cls="strength-minor";}
  else{txt="No Dip";}

  statusText.innerHTML=txt;
  strengthBar.className="strength-fill "+cls;
  strengthBar.style.width=Math.min(d*3,100)+"%";
}

document.querySelectorAll("#high,#current").forEach(i=>{
  i.oninput=calc;
});

calc();
</script>

</body>
</html>
